<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Advanced Editor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 15px;
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000000);
        }
        #editor-container { height: 300px; background: #fff; color: #000; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; }
        .ql-toolbar { border-top-left-radius: 8px; border-top-right-radius: 8px; background: #f5f5f5; }
        
        /* Стили кнопок тулбара */
        .ql-spoiler { width: auto !important; padding: 0 5px !important; font-size: 11px !important; font-weight: bold; color: #d9534f; }
        .ql-spoiler::after { content: " 👁 Спойлер"; }
        .ql-expandable-blockquote { width: auto !important; padding: 0 5px !important; font-size: 11px !important; font-weight: bold; color: #0275d8; }
        .ql-expandable-blockquote::after { content: " 📂 Раскр. цит"; }
        .ql-tg-emoji { width: auto !important; padding: 0 5px !important; font-size: 11px !important; font-weight: bold; color: #f0ad4e; }
        .ql-tg-emoji::after { content: " ✨ Ручной ID"; }

        /* Оформление в редакторе */
        .tg-spoiler { background-color: #ddd; color: transparent; text-shadow: 0 0 6px rgba(0,0,0,0.6); border-radius: 4px; padding: 0 2px; }
        .tg-expandable-blockquote { border-left: 4px dashed #0275d8 !important; background-color: #f4f9ff; padding-left: 10px; margin: 5px 0; font-style: italic; }
        .tg-premium-emoji { background-color: #fff8e7; border: 1px dashed #f0ad4e; border-radius: 4px; padding: 0 2px; }
        
        /* Панель кастомного пака эмодзи */
        .emoji-pack-box {
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            margin-top: 15px;
        }
        .emoji-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }
        .emoji-btn {
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .emoji-btn:hover {
            background-color: rgba(0, 0, 0, 0.1);
        }
        
        #send-btn {
            display: block; width: 100%; padding: 12px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="form-group">
        <label for="channel-id">Юзернейм канала:</label>
        <input type="text" id="channel-id" placeholder="Например: @my_channel_news">
    </div>

    <div class="form-group">
        <label>Контент поста:</label>
        <div id="editor-container"></div>
    </div>

    <div class="emoji-pack-box">
        <label>✨ Твой Премиум Пак (Быстрый клик):</label>
        <div class="emoji-grid" id="emoji-pack-grid"></div>
    </div>

    <button id="send-btn">Опубликовать</button>

            static formats(node) { return true; }
        }
        SpoilerBlot.blotName = 'spoiler'; SpoilerBlot.tagName = 'span';
        Quill.register(SpoilerBlot);

        // Регистрация Премиум-Эмодзи
        class TgEmojiBlot extends Inline {
            static create(value) {
                let node = super.create();
                node.setAttribute('class', 'tg-premium-emoji');
                node.setAttribute('data-id', value);
                return node;
            }
            static formats(node) { return node.getAttribute('data-id'); }
        }
        TgEmojiBlot.blotName = 'tg-emoji'; TgEmojiBlot.tagName = 'span';
        Quill.register(TgEmojiBlot);

        // Регистрация Сворачиваемой цитаты
        const Blockquote = Quill.import('formats/blockquote');
        class ExpandableBlockquote extends Blockquote {
            static create() { let node = super.create(); node.setAttribute('class', 'tg-expandable-blockquote'); return node; }
            static formats(node) { return true; }
        }
        ExpandableBlockquote.blotName = 'expandable-blockquote'; ExpandableBlockquote.tagName = 'blockquote';
        Quill.register(ExpandableBlockquote);

        const quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: {
                toolbar: {
                    container: [
                        ['bold', 'italic'],
                        ['blockquote', 'expandable-blockquote'],
                        ['spoiler', 'tg-emoji'],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        ['clean']
                    ],
                    handlers: {
                        'spoiler': function() {
                            const range = this.quill.getSelection();
                            if (range) {
                                if (this.quill.getFormat(range).spoiler) { this.quill.removeFormat(range.index, range.length); }
                                else { this.quill.format('spoiler', true); }
                            }
                        },
                        'expandable-blockquote': function() {
                            const range = this.quill.getSelection();
                            if (range) {
                                if (this.quill.getFormat(range)['expandable-blockquote']) { this.quill.format('expandable-blockquote', false); }
                                else { this.quill.format('expandable-blockquote', true); }
                            }
                        },
                        'tg-emoji': function() {
                            // Кнопка в тулбаре осталась для ручного ввода ID, если эмодзи нет в паке
                            const range = this.quill.getSelection();
                            if (range) {
                                const currentFormat = this.quill.getFormat(range)['tg-emoji'];
                                if (currentFormat) { this.quill.removeFormat(range.index, range.length); } 
                                else {
                                    const emojiId = prompt('Введи ручной ID премиум-эмодзи:');
                                    if (emojiId) { this.quill.format('tg-emoji', emojiId.trim()); }
                                }
                            }
                        }
                    }
                }
            }
        });

        // ГЕНЕРАЦИЯ СЕТКИ ЭМОДЗИ НА ЭКРАНЕ
        const gridContainer = document.getElementById('emoji-pack-grid');
        myEmojiPack.forEach(emoji => {
            const btn = document.createElement('button');
            btn.className = 'emoji-btn';
            btn.innerText = emoji.char;
            btn.title = `ID: ${emoji.id}`;
            
            // Обработка клика по эмодзи из пака
            btn.addEventListener('click', (e) => {
                e.preventDefault(); // Чтобы фокус с редактора не слетал полностью
                
                const range = quill.getSelection(true); // Берём текущую позицию курсора
                if (range) {
                    // Вставляем символ эмодзи и сразу вешаем на него формат премиум-эмодзи с нужным ID
                    quill.insertText(range.index, emoji.char, 'tg-emoji', emoji.id);
                    // Сдвигаем курсор вперёд, чтобы можно было писать дальше
                    quill.setSelection(range.index + emoji.char.length);
                }
            });
            gridContainer.appendChild(btn);
        });

document.getElementById('send-btn').addEventListener('click', () => {
            try {
                let htmlContent = quill.getSemanticHTML();
                const channelId = document.getElementById('channel-id').value.trim();
                
                // 1. Проверяем на пустоту. Если пусто — покажем красивое уведомление Телеграма, а не просто молчание
                if (!htmlContent || htmlContent === '<p><br></p>' || htmlContent === '<p></p>') {
                    tg.showAlert('Пожалуйста, напишите что-нибудь в редакторе перед публикацией!');
                    return;
                }

                // 2. Очищаем HTML от тегов <p>, которые Telegram HTML не поддерживает (исправляет ошибку со скриншота #1)
                let formattedHtml = htmlContent
                    .replace(/<p><br><\/p>/g, '\n') // заменяем пустые строки на переносы
                    .replace(/<p>/g, '')            // просто удаляем открывающий <p>
                    .replace(/<\/p>/g, '\n')         // заменяем закрывающий </p> на перенос строки
                    .trim();                        // убираем лишние пробелы по краям

                // 3. Отправляем данные боту
                tg.sendData(JSON.stringify({
                    html: formattedHtml,
                    channel_id: channelId ? channelId : null
                }));
                
                tg.close(); 
            } catch (err) { 
                // Если что-то пойдет не так, мы гарантированно увидим системное окно Telegram с ошибкой
                tg.showAlert('Ошибка при отправке: ' + err.message); 
            }
        });
    </script>
</body>
</html>
